services:
  postgres:
    image: postgres:16
    container_name: uninote-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: uninote
      POSTGRES_PASSWORD: uninote_password
      POSTGRES_DB: uninote_dev
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
